<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            margin: 0;
            color: #111;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin: 18px 0 14px;
            text-transform: uppercase;
        }

        h2 {
            color: #0000cc;
            font-size: 14px;
            margin: 0;
            padding: 14px 10px;
            text-transform: uppercase;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }

        form {
            padding: 14px 10px 18px;
            border-bottom: 1px solid #ddd;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 10px;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 14px;
            font-family: Arial, Helvetica, sans-serif;
        }

        textarea {
            height: 40px;
            resize: vertical;
        }

        input[type="submit"] {
            width: auto;
            color: #fff;
            border: 0;
            padding: 10px 14px;
            cursor: pointer;
        }

        .btn-encrypt {
            background: #0d6efd;
        }

        .btn-decrypt {
            background: #20a047;
        }

        .result {
            margin: 10px;
            line-height: 1.6;
            font-size: 14px;
        }

        .home {
            display: inline-block;
            margin: 0 10px 12px;
        }
    </style>
</head>
<body>
    <h1>Caesar Cipher</h1>
    <a class="home" href="/">Home</a>

    <h2>Encryption</h2>
    <form action="/caesar/encrypt" method="post" class="ajax-form" data-result="encryptResult">
        <label for="inputPlainText">Plain text:</label>
        <input type="text" id="inputPlainText" name="inputPlainText">
        <br><br>

        <label for="inputKeyPlain">Key:</label>
        <input type="number" id="inputKeyPlain" name="inputKeyPlain">
        <br><br>

        <input type="submit" value="Encrypt" class="btn-encrypt">
    </form>
    <div id="encryptResult" class="result"></div>

    <h2>Decryption</h2>
    <form action="/caesar/decrypt" method="post" class="ajax-form" data-result="decryptResult">
        <label for="inputCipherText">Cipher text:</label>
        <input type="text" id="inputCipherText" name="inputCipherText">
        <br><br>

        <label for="inputKeyCipher">Key:</label>
        <input type="number" id="inputKeyCipher" name="inputKeyCipher">
        <br><br>

        <input type="submit" value="Decrypt" class="btn-decrypt">
    </form>
    <div id="decryptResult" class="result"></div>

    <script>
        document.querySelectorAll(".ajax-form").forEach(function (form) {
            form.addEventListener("submit", function (event) {
                event.preventDefault();
                fetch(form.action, {
                    method: "POST",
                    body: new URLSearchParams(new FormData(form))
                })
                    .then(function (response) { return response.text(); })
                    .then(function (data) {
                        document.getElementById(form.dataset.result).innerHTML = data;
                    });
            });
        });
    </script>
</body>
</html>
